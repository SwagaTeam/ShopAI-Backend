services:
  shopai-api:
    image: ${DOCKER_REGISTRY-}shopai-backend:latest
    build:
      context: .
      dockerfile: ShopAI.Presentation/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Minio__Endpoint=${MINIO_ENDPOINT}
      - Minio__AccessKey=${MINIO_ROOT_USER}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD}
      - Minio__Bucket=${MINIO_BUCKET}
      - Minio__UseSsl=${MINIO_USE_SSL}
      - Admin__Email=${ADMIN_EMAIL}
      - Admin__Password=${ADMIN_PASSWORD}
      - Admin__FullName=${ADMIN_FULL_NAME}
      - Admin__Phone=${ADMIN_PHONE}
      - OpenRouter__BaseUrl=${OPENROUTER_BASE_URL}
      - OpenRouter__Model=${OPENROUTER_MODEL}
      - OpenRouter__FallbackModels=${OPENROUTER_FALLBACK_MODELS}
      - OpenRouter__MaxTokens=${OPENROUTER_MAX_TOKENS}
      - OpenRouter__Temperature=${OPENROUTER_TEMPERATURE}
      - OpenRouter__TopP=${OPENROUTER_TOP_P}
      - OpenRouter__ApiKey=${OPENROUTER_API_KEY}
    # ВАЖНО: Убираем ports "5000:8080" отсюда, чтобы закрыть прямой HTTP-доступ снаружи.
    # Теперь наружу будут смотреть только порты Nginx (80 и 443).
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - shopai-net

  db:
    image: postgres:16-alpine
    container_name: shopai-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - shopai-net

  minio:
    image: minio/minio:latest
    container_name: shopai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - shopai-net

  nginx:
    image: nginx:latest
    container_name: shopai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - shopai-api
    networks:
      - shopai-net
  
  certbot:
    image: certbot/certbot:latest
    container_name: shopai-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - shopai-net

networks:
  shopai-net:
    driver: bridge

volumes:
  pgdata:
  minio-data: