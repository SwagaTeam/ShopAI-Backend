name: shopai

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: shopai-nginx
    restart: unless-stopped
    depends_on:
      - shopai-api
      - shopai-frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shopai-net

  shopai-frontend:
    container_name: shopai-frontend
    restart: unless-stopped
    build:
      context: ${FRONTEND_DIR}
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${FRONTEND_BACKEND_URL:-http://shopai-api:8080/api}
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      BACKEND_URL: ${FRONTEND_BACKEND_URL:-http://shopai-api:8080/api}
    expose:
      - "3000"
    networks:
      - shopai-net

  shopai-api:
    container_name: shopai-api
    restart: unless-stopped
    build:
      context: ${BACKEND_DIR}
      dockerfile: ShopAI.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      Swagger__Enabled: ${SWAGGER_ENABLED:-false}
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Minio__Endpoint: ${MINIO_ENDPOINT}
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Bucket: ${MINIO_BUCKET}
      Minio__UseSsl: ${MINIO_USE_SSL}
      Admin__Email: ${ADMIN_EMAIL}
      Admin__Password: ${ADMIN_PASSWORD}
      Admin__FullName: ${ADMIN_FULL_NAME}
      Admin__Phone: ${ADMIN_PHONE}
      OpenRouter__BaseUrl: ${OPENROUTER_BASE_URL}
      OpenRouter__Model: ${OPENROUTER_MODEL}
      OpenRouter__FallbackModels: ${OPENROUTER_FALLBACK_MODELS}
      OpenRouter__MaxTokens: ${OPENROUTER_MAX_TOKENS}
      OpenRouter__Temperature: ${OPENROUTER_TEMPERATURE}
      OpenRouter__TopP: ${OPENROUTER_TOP_P}
      OpenRouter__ApiKey: ${OPENROUTER_API_KEY}
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-5000}:8080"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - shopai-net

  db:
    image: postgres:16-alpine
    container_name: shopai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_BIND:-127.0.0.1}:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - shopai-net

  minio:
    image: minio/minio:latest
    container_name: shopai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_BIND:-0.0.0.0}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - shopai-net

networks:
  shopai-net:
    driver: bridge

volumes:
  pgdata:
  minio-data:
