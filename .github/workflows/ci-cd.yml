name: Backend CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ShopAI.Presentation/ShopAI.Presentation.csproj

      - name: Build
        run: dotnet build ShopAI.Presentation/ShopAI.Presentation.csproj --configuration Release --no-restore

      - name: Test
        shell: bash
        run: |
          mapfile -t test_projects < <(find . -type f \( -name '*Tests.csproj' -o -name '*Test.csproj' \))
          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found."
            exit 0
          fi

          for project in "${test_projects[@]}"; do
            dotnet test "$project" --configuration Release --no-build
          done

      - name: Build Docker image
        run: docker build -f ShopAI.Presentation/Dockerfile -t shopai-backend:ci .

  deploy:
    name: Deploy backend and frontend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    env:
      SERVER_HOST: ${{ vars.SERVER_HOST || '84.252.132.226' }}
      SERVER_USER: ${{ vars.SERVER_USER || 'sraka' }}
      SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
      APP_DIR: ${{ vars.APP_DIR }}
      BACKEND_BRANCH: master
      FRONTEND_BRANCH: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -z "${SERVER_SSH_KEY}" ]; then
            echo "::error::Missing repository secret SERVER_SSH_KEY."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/shopai_deploy_key
          chmod 600 ~/.ssh/shopai_deploy_key

      - name: Trust server host key
        run: ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload backend source
        shell: bash
        run: |
          tar \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='bin' \
            --exclude='obj' \
            --exclude='**/bin' \
            --exclude='**/obj' \
            -czf - . \
            | ssh -i ~/.ssh/shopai_deploy_key -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "APP_DIR='${APP_DIR}' sh -c 'app_dir=\"\${APP_DIR:-\$HOME/shopai}\"; tmp=\"\$app_dir/backend.release\"; target=\"\$app_dir/backend\"; rm -rf \"\$tmp\"; mkdir -p \"\$tmp\"; tar -xzf - -C \"\$tmp\"; if [ -f \"\$target/.env\" ]; then cp \"\$target/.env\" \"\$tmp/.env\"; fi; rm -rf \"\$target\"; mv \"\$tmp\" \"\$target\"'"

      - name: Upload production environment
        shell: bash
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          if [ -z "${PROD_ENV_FILE}" ]; then
            echo "PROD_ENV_FILE is not set; the deploy script will use an existing server .env file."
            exit 0
          fi

          remote_env_path="$(
            printf '%s' "${PROD_ENV_FILE}" | ssh -i ~/.ssh/shopai_deploy_key -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" "APP_DIR='${APP_DIR}' sh -c 'app_dir=\"\${APP_DIR:-\$HOME/shopai}\"; mkdir -p \"\$app_dir\"; tmp_file=\"\$app_dir/.env.incoming\"; umask 077; cat > \"\$tmp_file\"; printf \"%s\" \"\$tmp_file\"'"
          )"

          echo "REMOTE_ENV_PATH=${remote_env_path}" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/shopai_deploy_key -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "APP_DIR='${APP_DIR}' BACKEND_BRANCH='${BACKEND_BRANCH}' FRONTEND_BRANCH='${FRONTEND_BRANCH}' SHOPAI_ENV_FILE='${REMOTE_ENV_PATH:-}' SKIP_GIT_SYNC='true' bash -s" \
            < deploy/deploy.sh
